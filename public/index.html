<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div class="container">
      <nav class="nav">
        <!-- <div class="nav__logo">
          <a href="#" class="nav__item">Daragh Coll</a>
        </div> -->
        <div class="nav__links">
          <a href="#_section_projects" class="nav__item">Projects</a>
          <a href="#_section_skills" class="nav__item">Skills</a>
          <a href="#_section_contact" class="nav__item">Contact</a>
        </div>
      </nav>

      <section id="_secion_landing" class="landing">
        <h1>DARAGH COLL</h1>
        <h2>Full Stack Developer</h2>
      </section>

      <!-- PROJECTS -->
      <section id="_section_projects" class="projects-section">
        <div class="section-heading">
          <div>
            <h1>Projects</h1>
            <div class="section__underline"></div>
          </div>
        </div>
        <div class="projects" id="_projects__list"></div>
      </section>

      <!-- SKILLS -->
      <section id="_section_skills" class="skills-section">
        <div class="section-heading">
          <div>
            <h1>Skills</h1>
            <div class="section__underline"></div>
          </div>
        </div>

        <div class="skills">
          <img
            loading="lazy"
            src="./assets/dev-icons/JS.png"
            alt="javascript"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/angular.svg"
            alt="angular"
          />
          <img loading="lazy" src="./assets/dev-icons/vuejs.svg" alt="vuejs" />
          <img loading="lazy" src="./assets/dev-icons/react.svg" alt="react" />
          <img loading="lazy" src="./assets/dev-icons/sass.svg" alt="sass" />
          <img
            loading="lazy"
            src="./assets/dev-icons/nodejs.svg"
            alt="nodejs"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/cypress.webp"
            alt="nodejs"
            class="skill-cypress"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/gridsome.png"
            alt="gridsome"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/typescript.svg"
            alt="typescript"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/electron.svg"
            alt="electron"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/docker.svg"
            alt="docker"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/firebase.svg"
            alt="firebase"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/mongodb.svg"
            alt="mongodb"
          />
          <img
            loading="lazy"
            src="./assets/dev-icons/netlify.png"
            alt="netlify"
          />
          <img loading="lazy" src="./assets/dev-icons/aws.svg" alt="aws" />
          <img loading="lazy" src="./assets/dev-icons/xd.png" alt="xd" />
        </div>
      </section>

      <!-- CONTACT -->
      <section id="_section_contact" class="contact">
        <div class="section-heading">
          <div>
            <h1>Contact</h1>
            <div class="section__underline"></div>
          </div>
        </div>
        <form
          id="contact-form"
          class="contact__form"
          name="contact"
          autocomplete="off"
          method="POST"
          data-netlify="true"
          netlify-honeypot="bot-field"
          data-netlify-recaptcha="true"
        >
          <!-- name -->
          <div class="float">
            <input
              id="contact_name"
              class="form__item"
              type="text"
              name="from_name"
              placeholder=" "
              required
            />
            <label for="contact_name" class="form__label">Name</label>
          </div>

          <!-- email -->
          <div class="float">
            <input
              id="contact_email"
              class="form__item"
              type="email"
              name="from_email"
              placeholder=" "
              required
            />
            <label for="contact_email" class="form__label">Email</label>
          </div>

          <!-- message -->
          <div class="float">
            <textarea
              id="contact_message"
              class="form__item form__message"
              name="message"
              placeholder=" "
              required
            ></textarea>
            <label for="contact_message" class="form__label">Message</label>
          </div>

          <!-- honeypot field -->
          <div class="honeypot">
            <input name="bot-field" />
            <label for="contact_email" class="form__label"
              >dont fill out this field if human</label
            >
          </div>

          <!-- recaptcha -->
          <div data-netlify-recaptcha="true"></div>

          <!-- submit -->
          <div class="submit-form">
            <button type="submit" class="btn-secondary" type="submit">
              Send
              <svg class="submit-icon" fill="none" height="24" width="24">
                <path
                  d="M2 6C2 4.89543 2.89543 4 4 4H20C21.1046 4 22 4.89543 22 6V18C22 19.1046 21.1046 20 20 20H4C2.89543 20 2 19.1046 2 18V6ZM5.51859 6L12 11.6712L18.4814 6H5.51859ZM20 7.32877L12.6585 13.7526C12.2815 14.0825 11.7185 14.0825 11.3415 13.7526L4 7.32877V18H20V7.32877Z"
                  fill="#fff"
                ></path>
              </svg>
            </button>
          </div>
        </form>
      </section>
    </div>

    <script src="../src/js/app.js"></script>
  </body>
</html>
